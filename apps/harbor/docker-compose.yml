services:
  harbor-init:
    image: python:3.11-alpine
    entrypoint: []
    restart: "no"
    environment:
      - HARBOR_ADMIN_PASSWORD=${HARBOR_ADMIN_PASSWORD}
      - HARBOR_DB_PASSWORD=${HARBOR_DB_PASSWORD}
      - HARBOR_SECRET_KEY=${HARBOR_SECRET_KEY}
      - HARBOR_CORE_SECRET=${HARBOR_CORE_SECRET}
      - HARBOR_JOBSERVICE_SECRET=${HARBOR_JOBSERVICE_SECRET}
      - HARBOR_REGISTRY_PASSWORD=${HARBOR_REGISTRY_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/config:/config
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/secret:/secret
    command:
      - sh
      - -c
      - |
        apk add --no-cache openssl > /dev/null 2>&1

        cat > /tmp/init.py << 'PYEOF'
        import os, subprocess, shutil

        dirs = [
            '/config/core/certificates',
            '/config/registry',
            '/config/registryctl',
            '/config/jobservice',
            '/config/nginx/conf.d',
            '/config/shared/trust-certificates',
            '/data/registry',
            '/data/ca_download',
            '/data/job_logs',
            '/secret/core',
            '/secret/registry',
        ]
        for d in dirs:
            os.makedirs(d, exist_ok=True)

        os.makedirs('/data/database', exist_ok=True)
        subprocess.run(['chown', '-R', '999:999', '/data/database'], check=False)

        registry_user = 'harbor_registry_user'
        registry_pass = os.environ.get('HARBOR_REGISTRY_PASSWORD', 'default_reg_pass')

        if not os.path.exists('/secret/core/private_key.pem'):
            subprocess.run(['openssl', 'genrsa', '-out', '/secret/core/private_key.pem', '4096'], check=True, stderr=subprocess.DEVNULL)
            subprocess.run(['openssl', 'req', '-new', '-x509',
                '-key', '/secret/core/private_key.pem',
                '-out', '/secret/registry/root.crt',
                '-days', '3650',
                '-subj', '/C=US/ST=CA/L=Harbor/O=Harbor/CN=harbor-ca'], check=True, stderr=subprocess.DEVNULL)
            shutil.copy('/secret/registry/root.crt', '/config/shared/trust-certificates/harbor_internal_ca.crt')

        shutil.copy('/secret/core/private_key.pem', '/config/core/private_key.pem')
        shutil.copy('/secret/registry/root.crt', '/config/registry/root.crt')
        os.chmod('/config/core/private_key.pem', 0o600)
        os.chmod('/secret/core/private_key.pem', 0o600)

        with open('/config/core/app.conf', 'w') as f:
            f.write('appname = Harbor\nrunmode = prod\nenablegzip = true\n\n[prod]\nhttpport = 8080\n')

        # Registry config — edit harbor-registry-config.yml in the appstore to change this
        registry_cfg = """\
        version: 0.1
        log:
          level: info
          fields:
            service: registry
        storage:
          cache:
            layerinfo: redis
          filesystem:
            rootdirectory: /storage
          maintenance:
            uploadpurging:
              enabled: false
          delete:
            enabled: true
        redis:
          addr: harbor-redis:6379
          readtimeout: 10s
          writetimeout: 10s
          dialtimeout: 10s
          password: ""
          username: ""
          db: 1
          enableTLS: false
          pool:
            maxidle: 100
            maxactive: 500
            idletimeout: 60s
        http:
          addr: :5000
          secret: placeholder
          debug:
            addr: localhost:5001
        auth:
          htpasswd:
            realm: harbor-registry-basic-realm
            path: /etc/registry/passwd
        validation:
          disabled: true
        compatibility:
          schema1:
            enabled: true
        """
        import textwrap
        with open('/config/registry/config.yml', 'w') as f:
            f.write(textwrap.dedent(registry_cfg))

        result = subprocess.run(['openssl', 'passwd', '-apr1', registry_pass], capture_output=True, text=True)
        with open('/config/registry/passwd', 'w') as f:
            f.write(registry_user + ':' + result.stdout.strip() + '\n')

        with open('/config/registryctl/config.yml', 'w') as f:
            f.write('protocol: "http"\nport: 8080\nlog_level: info\nregistry_config: "/etc/registry/config.yml"\n')

        with open('/config/jobservice/config.yml', 'w') as f:
            f.write("""\
        ---
        protocol: "http"
        port: 8080
        worker_pool:
          workers: 10
          backend: "redis"
          redis_pool:
            redis_url: redis://harbor-redis:6379/2
            namespace: "harbor_job_service_namespace"
            idle_timeout_second: 3600
        job_loggers:
          - name: "STD_OUTPUT"
            level: "INFO"
          - name: "FILE"
            level: "INFO"
            settings:
              base_dir: "/var/log/jobs"
            sweeper:
              duration: 14
              settings:
                work_dir: "/var/log/jobs"
        loggers:
          - name: "STD_OUTPUT"
            level: "INFO"
        reaper:
          max_update_hours: 24
          max_dangling_hours: 168
        max_retrieve_size_mb: 10
        """)

        nginx = """\
        worker_processes auto;
        pid /tmp/nginx.pid;
        events {
          worker_connections 3096;
          use epoll;
          multi_accept on;
        }
        http {
          resolver 127.0.0.11 valid=30s ipv6=off;
          resolver_timeout 10s;
          client_body_temp_path /tmp/client_body_temp;
          proxy_temp_path /tmp/proxy_temp;
          fastcgi_temp_path /tmp/fastcgi_temp;
          uwsgi_temp_path /tmp/uwsgi_temp;
          scgi_temp_path /tmp/scgi_temp;
          tcp_nodelay on;
          proxy_http_version 1.1;
          map $$http_x_forwarded_proto $$x_forwarded_proto {
            default $$http_x_forwarded_proto;
            "" $$scheme;
          }
          server {
            listen 8080;
            server_tokens off;
            client_max_body_size 0;
            set $$portal harbor-portal:8080;
            set $$core harbor-core:8080;
            location / {
              proxy_pass http://$$portal;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$x_forwarded_proto;
              proxy_buffering off;
              proxy_request_buffering off;
            }
            location /c/ {
              proxy_pass http://$$core;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$x_forwarded_proto;
              proxy_buffering off;
              proxy_request_buffering off;
              proxy_send_timeout 900;
              proxy_read_timeout 900;
            }
            location /api/ {
              proxy_pass http://$$core;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$x_forwarded_proto;
              proxy_buffering off;
              proxy_request_buffering off;
            }
            location /v1/ { return 404; }
            location /v2/ {
              proxy_pass http://$$core;
              proxy_set_header Host $$http_host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$x_forwarded_proto;
              proxy_buffering off;
              proxy_request_buffering off;
              proxy_send_timeout 900;
              proxy_read_timeout 900;
            }
            location /service/ {
              proxy_pass http://$$core;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$x_forwarded_proto;
              proxy_buffering off;
              proxy_request_buffering off;
            }
            location /service/notifications { return 404; }
          }
        }
        """
        with open('/config/nginx/nginx.conf', 'w') as f:
            f.write(textwrap.dedent(nginx))

        portal_nginx = """\
        worker_processes auto;
        pid /tmp/nginx.pid;
        events {
          worker_connections 1024;
        }
        http {
          include mime.types;
          default_type application/octet-stream;
          sendfile on;
          keepalive_timeout 65;
          server {
            listen 8080;
            server_name localhost;
            client_max_body_size 0;
            root /usr/share/nginx/html;
            index index.html index.htm;
            location / {
              try_files $$uri $$uri/ /index.html;
            }
          }
        }
        """
        with open('/config/nginx/portal.conf', 'w') as f:
            f.write(textwrap.dedent(portal_nginx))

        print('Harbor configuration generated successfully')
        PYEOF

        python3 /tmp/init.py

  harbor-db:
    image: goharbor/harbor-db:v2.15.0
    environment:
      - POSTGRES_PASSWORD=${HARBOR_DB_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/data/database:/var/lib/postgresql/data
    depends_on:
      harbor-init:
        condition: service_completed_successfully
    healthcheck:
      test: pg_isready -d registry -U postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  harbor-redis:
    image: goharbor/redis-photon:v2.15.0
    volumes:
      - ${APP_DATA_DIR}/data/redis:/var/lib/redis
    depends_on:
      harbor-init:
        condition: service_completed_successfully

  harbor-registry:
    image: goharbor/registry-photon:v2.15.0
    volumes:
      - ${APP_DATA_DIR}/config/registry:/etc/registry
      - ${APP_DATA_DIR}/data/registry:/storage
      - ${APP_DATA_DIR}/config/shared/trust-certificates:/harbor_cust_cert
    depends_on:
      harbor-init:
        condition: service_completed_successfully

  harbor-registryctl:
    image: goharbor/harbor-registryctl:v2.15.0
    environment:
      - CORE_SECRET=${HARBOR_CORE_SECRET}
      - JOBSERVICE_SECRET=${HARBOR_JOBSERVICE_SECRET}
    volumes:
      - ${APP_DATA_DIR}/config/registry:/etc/registry
      - ${APP_DATA_DIR}/config/registryctl:/etc/registryctl
      - ${APP_DATA_DIR}/data/registry:/storage
      - ${APP_DATA_DIR}/config/shared/trust-certificates:/harbor_cust_cert
    depends_on:
      harbor-registry:
        condition: service_started

  harbor-core:
    image: goharbor/harbor-core:v2.15.0
    environment:
      - _REDIS_URL_CORE=redis://harbor-redis:6379/0
      - _REDIS_URL_REG=redis://harbor-redis:6379/1
      - EXT_ENDPOINT=${APP_PROTOCOL:-http}://${APP_DOMAIN}
      - DATABASE_TYPE=postgresql
      - POSTGRESQL_HOST=harbor-db
      - POSTGRESQL_PORT=5432
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=${HARBOR_DB_PASSWORD}
      - POSTGRESQL_DATABASE=registry
      - POSTGRESQL_SSLMODE=disable
      - POSTGRESQL_MAX_IDLE_CONNS=50
      - POSTGRESQL_MAX_OPEN_CONNS=1000
      - POSTGRESQL_CONN_MAX_LIFETIME=0ms
      - POSTGRESQL_CONN_MAX_IDLE_TIME=0ms
      - REGISTRY_URL=http://harbor-registry:5000
      - PORTAL_URL=http://harbor-portal:8080
      - TOKEN_SERVICE_URL=http://harbor-core:8080/service/token
      - HARBOR_ADMIN_PASSWORD=${HARBOR_ADMIN_PASSWORD}
      - MAX_JOB_WORKERS=10
      - CORE_SECRET=${HARBOR_CORE_SECRET}
      - JOBSERVICE_SECRET=${HARBOR_JOBSERVICE_SECRET}
      - WITH_TRIVY=false
      - CORE_URL=http://harbor-core:8080
      - CORE_LOCAL_URL=http://harbor-core:8080
      - JOBSERVICE_URL=http://harbor-jobservice:8080
      - TRIVY_ADAPTER_URL=http://trivy-adapter:8080
      - REGISTRY_STORAGE_PROVIDER_NAME=filesystem
      - READ_ONLY=false
      - REGISTRY_CONTROLLER_URL=http://harbor-registryctl:8080
      - REGISTRY_CREDENTIAL_USERNAME=harbor_registry_user
      - REGISTRY_CREDENTIAL_PASSWORD=${HARBOR_REGISTRY_PASSWORD}
      - CSRF_KEY=${HARBOR_SECRET_KEY}
      - ROBOT_SCANNER_NAME_PREFIX=robotscanningaccount
      - PERMITTED_REGISTRY_TYPES_FOR_PROXY_CACHE=docker-hub,harbor,azure-acr,ali-acr,aws-ecr,google-gcr,docker-registry,github-ghcr,jfrog-artifactory
      - TOKEN_PRIVATE_KEY_PATH=/etc/core/private_key.pem
      - PORT=8080
      - LOG_LEVEL=info
      - NO_PROXY=harbor-core,harbor-jobservice,harbor-db,harbor-redis,harbor-portal,harbor-registry,harbor-registryctl,127.0.0.1,localhost,.local,.internal
    volumes:
      - ${APP_DATA_DIR}/config/core:/etc/core
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/data/ca_download:/etc/core/ca
      - ${APP_DATA_DIR}/config/shared/trust-certificates:/harbor_cust_cert
    depends_on:
      harbor-db:
        condition: service_healthy
      harbor-redis:
        condition: service_started
      harbor-registry:
        condition: service_started
      harbor-registryctl:
        condition: service_started
    healthcheck:
      test: curl -sf http://127.0.0.1:8080/api/v2.0/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  harbor-portal:
    image: goharbor/harbor-portal:v2.15.0
    user: root
    volumes:
      - ${APP_DATA_DIR}/config/nginx/portal.conf:/etc/nginx/nginx.conf
    depends_on:
      harbor-init:
        condition: service_completed_successfully

  harbor-jobservice:
    image: goharbor/harbor-jobservice:v2.15.0
    environment:
      - CORE_SECRET=${HARBOR_CORE_SECRET}
      - REGISTRY_URL=http://harbor-registry:5000
      - JOBSERVICE_SECRET=${HARBOR_JOBSERVICE_SECRET}
      - CORE_URL=http://harbor-core:8080
      - REGISTRY_CONTROLLER_URL=http://harbor-registryctl:8080
      - JOBSERVICE_WEBHOOK_JOB_MAX_RETRY=3
      - JOBSERVICE_WEBHOOK_JOB_HTTP_CLIENT_TIMEOUT=10
      - LOG_LEVEL=info
      - NO_PROXY=harbor-core,harbor-jobservice,harbor-db,harbor-redis,harbor-portal,harbor-registry,harbor-registryctl,127.0.0.1,localhost,.local,.internal
      - REGISTRY_CREDENTIAL_USERNAME=harbor_registry_user
      - REGISTRY_CREDENTIAL_PASSWORD=${HARBOR_REGISTRY_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/config/jobservice:/etc/jobservice
      - ${APP_DATA_DIR}/config/shared/trust-certificates:/harbor_cust_cert
      - ${APP_DATA_DIR}/data/job_logs:/var/log/jobs
    depends_on:
      harbor-core:
        condition: service_healthy

  harbor:
    image: goharbor/nginx-photon:v2.15.0
    volumes:
      - ${APP_DATA_DIR}/config/nginx:/etc/nginx
      - ${APP_DATA_DIR}/config/shared/trust-certificates:/harbor_cust_cert
    depends_on:
      harbor-registry:
        condition: service_started
      harbor-core:
        condition: service_healthy
      harbor-portal:
        condition: service_started
    healthcheck:
      test: curl -sf http://127.0.0.1:8080/api/v2.0/ping || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    x-runtipi:
      is_main: true
      internal_port: 8080

x-runtipi:
  schema_version: 2
